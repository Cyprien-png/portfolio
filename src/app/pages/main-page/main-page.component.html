<app-navbar />
<section id="about" class="full-screen">
    <div class="about">
        <img src="../../../assets/cyprien-jaquier.png">

        <div>
            <h1><b class="text-shining">Full stack</b> developer</h1>
            <p>From concept to execution,<br>I'm one of those magician weaving digital dreams into reality.</p>
        </div>
    </div>

    <app-scroll-button [targetID]="'projects'" />
</section>


<section id="projects" class="full-screen">
    <h2>Here are three projects I'm proud of.</h2>

    <div class="cards">
        <app-three-d-card />
        <app-three-d-card />
        <app-three-d-card />
    </div>

    <app-scroll-button [targetID]="'skills'" />
</section>

<section id="skills" class="full-screen">
    <h2>Here are some of my favorites technos.</h2>

    <div id="skills-container">
        <div class="technos-container">
            <!-- loop for each languages -->
            
            <div *ngFor="let language of languages" class="magnetic-techno">
                <app-magnetic-circle [name]="language.name" [icon]="language.icon" />
            </div>

        </div>
        <div class="technos-container">
            <!-- loop for each frameworks / libs -->
            
            <div *ngFor="let framework of frameworks" class="magnetic-techno">
                <app-magnetic-circle [name]="framework.name" [icon]="framework.icon" />
            </div>
        </div>
    </div>

    <app-scroll-button [targetID]="'contact'" />
</section>

<section id="contact">
    <h2>Feel free to reach out to me!</h2>

    <div class="contact-container">
        <div class="contact-icon">
            <app-bordered-circle linkhref="https://linkedin.com/in/cyprien-jaquier-138ba1220"
                imgsrc="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/LinkedIn_logo_initials.png/600px-LinkedIn_logo_initials.png?20140125013055" />
        </div>
        <div class="contact-icon">
            <app-bordered-circle linkhref="https://github.com/Cyprien-png"
                imgsrc="https://cdn.pixabay.com/photo/2022/01/30/13/33/github-6980894_1280.png" />
        </div>
        <div class="contact-icon">
            <app-bordered-circle linkhref="mailto:cyprien@jaquier.dev"
                imgsrc="https://www.pngall.com/wp-content/uploads/13/Email-Logo-PNG-Image-HD.png" />
        </div>
    </div>
</section>
